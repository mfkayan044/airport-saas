<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteDrive Admin | Corporate Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .h-font { font-family: 'Outfit', sans-serif; }
        .sidebar-active { background: #f1f5f9; color: #1d4ed8; border-right: 4px solid #3b82f6; }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const sb = supabase.createClient('https://nbzmixvtgxjqwvsjzwjk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iem1peHZ0Z3hqcXd2c2p6d2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjU3MzIsImV4cCI6MjA5MDEwMTczMn0.ZeWBdBQvDJC7u-c8OqMp2Q9dPuvpxfLkt7vG8vQsRuM');
        const SITE_KEY = 'premium';

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [data, setData] = useState({
                currency: '₺', phone: '', email: '', location: '', whatsapp: '',
                airports: [], districts: [], routes: [], fleet: [], testimonials: [], reservations: []
            });
            const [toast, setToast] = useState(null);
            const [refreshing, setRefreshing] = useState(false);

            useEffect(() => {
                sync();
                
                // Realtime subscription
                const sub = sb.channel('reservations-premium')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'reservations', filter: `site_key=eq.${SITE_KEY}` }, payload => {
                        sync();
                        if (payload.event === 'INSERT') showToast("Yeni rezervasyon geldi! #" + payload.new.booking_ref);
                    })
                    .subscribe();

                return () => sb.removeChannel(sub);
            }, []);

            const sync = async () => {
                setRefreshing(true);
                try {
                    const [settings, airports, districts, fleet, routes, testimonials, reservations, drivers] = await Promise.all([
                        sb.from('site_settings').select('*').eq('site_key', SITE_KEY).single(),
                        sb.from('airports').select('*').eq('site_key', SITE_KEY),
                        sb.from('districts').select('*').eq('site_key', SITE_KEY),
                        sb.from('fleet').select('*').eq('site_key', SITE_KEY),
                        sb.from('routes').select('*').eq('site_key', SITE_KEY),
                        sb.from('testimonials').select('*').eq('site_key', SITE_KEY),
                        sb.from('reservations').select('*').eq('site_key', SITE_KEY).order('created_at', { ascending: false }),
                        sb.from('drivers').select('*').eq('site_key', SITE_KEY)
                    ]);

                    setData({
                        ...(settings.data || {}),
                        airports: airports.data || [],
                        districts: districts.data || [],
                        fleet: fleet.data || [],
                        routes: routes.data || [],
                        testimonials: testimonials.data || [],
                        reservations: reservations.data || [],
                        drivers: drivers.data || []
                    });
                } catch (err) {
                    console.error('Sync Error:', err);
                }
                setRefreshing(false);
            };

            const updateData = async (newData, table = 'site_settings', op = 'update', id = null) => {
                setData(newData); // Optimistic update
                // Note: Complex logic handled by dedicated view functions for single-table updates
            };

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const SidebarItem = ({ id, icon, label }) => (
                <button 
                    onClick={() => setActiveTab(id)}
                    className={`w-full flex items-center gap-4 px-8 py-5 transition-all outline-none ${activeTab === id ? 'sidebar-active shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}
                >
                    <i className={`fas ${icon} w-5 text-lg ${activeTab === id ? 'text-blue-600' : 'text-slate-400'}`}></i>
                    <span className="font-bold text-sm tracking-tight">{label}</span>
                </button>
            );

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-72 bg-white border-r border-slate-100 fixed h-full flex flex-col z-50">
                        <div className="p-10">
                            <h2 className="text-2xl font-black h-font tracking-tighter text-slate-900 italic">ELITE<span class="text-blue-600">DRIVE</span></h2>
                            <p className="text-[9px] text-slate-400 font-black tracking-widest uppercase mt-2">Intelligence Hub v2.0</p>
                        </div>
                        <nav className="flex-1 overflow-y-auto py-8">
                            <SidebarItem id="dashboard" icon="fa-th-large" label="Kontrol Paneli" />
                            <SidebarItem id="bookings" icon="fa-calendar-check" label="Rezervasyonlar" />
                            <SidebarItem id="timeline" icon="fa-stream" label="Zaman Çizelgesi" />
                            <SidebarItem id="drivers" icon="fa-user-tie" label="Sürücü Yönetimi" />
                            <SidebarItem id="customers" icon="fa-users" label="Müşteri CRM" />
                            <SidebarItem id="routes" icon="fa-map-marked-alt" label="Fiyat / Rota" />
                            <SidebarItem id="locations" icon="fa-map-pin" label="Bölge & Havalimanı" />
                            <SidebarItem id="fleet" icon="fa-car" label="VIP Araçlar" />
                            <SidebarItem id="settings" icon="fa-cog" label="Site Ayarları" />
                        </nav>
                        <div className="p-8 border-t border-slate-50">
                            <a href="index.html" target="_blank" className="flex items-center gap-3 text-xs font-black text-slate-400 hover:text-blue-600 transition-all uppercase tracking-widest">
                                <i className="fas fa-external-link-alt text-lg"></i> Siteyi Aç
                            </a>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 ml-72 p-12 relative">
                        <header className="flex justify-between items-center mb-12">
                            <div>
                                <h1 className="text-3xl font-black text-slate-900 h-font uppercase tracking-tighter">
                                    {activeTab === 'dashboard' ? 'Dashboard' :
                                     activeTab === 'bookings' ? 'Rezervasyon & Atama' :
                                     activeTab === 'drivers' ? 'Sürücü Portföyü' :
                                     activeTab === 'timeline' ? 'Zaman Akışı' :
                                     activeTab === 'routes' ? 'Fiyatlandırma' :
                                     activeTab === 'locations' ? 'Havalimanı & Bölge' :
                                     activeTab === 'fleet' ? 'Araç Yönetimi' : 'Yapılandırma'}
                                </h1>
                                <p className="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Sistem Durumu: <span className="text-green-500">Operasyonel</span></p>
                            </div>
                            <div className="flex items-center gap-6">
                                <button onClick={sync} className={`w-10 h-10 rounded-full bg-white border border-slate-100 text-slate-400 hover:text-blue-600 transition-all shadow-sm ${refreshing ? 'animate-spin' : ''}`}>
                                    <i className="fas fa-sync-alt"></i>
                                </button>
                                <div className="flex items-center gap-4 bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="text-right">
                                        <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Yönetici</p>
                                        <p className="text-sm font-black text-blue-600 leading-none tracking-tight">System Admin</p>
                                    </div>
                                    <div className="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black shadow-lg shadow-blue-500/30">SA</div>
                                </div>
                            </div>
                        </header>

                        <div className="animate-in fade-in slide-in-from-bottom-5 duration-700">
                            {activeTab === 'dashboard' && <DashboardView data={data} />}
                            {activeTab === 'bookings' && <BookingsView data={data} updateData={updateData} showToast={showToast} />}
                            {activeTab === 'timeline' && <TimelineView data={data} />}
                            {activeTab === 'drivers' && <DriversView data={data} showToast={showToast} updateData={updateData} />}
                            {activeTab === 'customers' && <CustomersView data={data} showToast={showToast} />}
                            {activeTab === 'routes' && <RoutesView data={data} updateData={updateData} showToast={showToast} />}
                            {activeTab === 'locations' && <LocationsView data={data} updateData={updateData} showToast={showToast} />}
                            {activeTab === 'fleet' && <FleetView data={data} updateData={updateData} showToast={showToast} />}
                            {activeTab === 'settings' && <SettingsView data={data} updateData={updateData} showToast={showToast} />}
                        </div>
                    </main>

                    {toast && (
                        <div className="fixed bottom-10 right-10 bg-white text-slate-900 px-8 py-5 rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.2)] flex items-center gap-4 z-[1000] border-2 border-blue-500 animate-in slide-in-from-right-10 duration-500">
                            <div className="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                                <i className="fas fa-info-circle text-lg"></i>
                            </div>
                            <div>
                                <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest leading-none mb-1">BİLGİ</p>
                                <span className="font-black text-sm tracking-tight">{toast}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SUB VIEWS ---

        const DashboardView = ({ data }) => {
            const todayStr = new Date().toISOString().split('T')[0];
            const todayBookings = data.reservations.filter(r => r.transfer_date && r.transfer_date.includes(todayStr)).length;
            const monthlySpent = data.reservations.reduce((acc, curr) => acc + (curr.total_price || 0), 0);

            return (
                <div className="space-y-12">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <StatCard label="Bugünkü Talep" value={todayBookings} icon="fa-bolt" color="blue" />
                        <StatCard label="Toplam Ciro" value={data.currency + " " + monthlySpent.toLocaleString()} icon="fa-wallet" color="green" />
                        <StatCard label="Aktif Filo" value={data.fleet.filter(f => f.is_active).length} icon="fa-car-battery" color="indigo" />
                        <StatCard label="Müşteri Memnuniyeti" value="%98.4" icon="fa-chart-line" color="orange" />
                    </div>
                    
                    <div className="grid grid-cols-3 gap-10">
                        <div className="col-span-2 card p-10">
                            <h3 className="text-xl font-black h-font mb-10 uppercase tracking-tighter italic">Son Kayıtlar</h3>
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="border-b border-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                        <tr>
                                            <th className="pb-4 text-left">Müşteri / Ref</th>
                                            <th className="pb-4 text-left">Rota Info</th>
                                            <th className="pb-4 text-right">Durum</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {data.reservations.slice(0, 8).map(r => (
                                            <tr key={r.id} className="group hover:bg-slate-50 transition-colors">
                                                <td className="py-5">
                                                    <p className="font-black text-slate-900 tracking-tight text-sm uppercase">{r.customer_name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase italic mt-1">#{r.id.split('-')[0]}</p>
                                                </td>
                                                <td className="py-5">
                                                    <p className="text-xs font-bold text-slate-600 uppercase tracking-tight">{r.from_location} ➔ {r.to_location}</p>
                                                    <p className="text-[10px] text-blue-500 font-black mt-1 uppercase tracking-widest">{r.transfer_date} / {r.transfer_time}</p>
                                                </td>
                                                <td className="py-5 text-right">
                                                    <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${r.status === 'Onaylandı' ? 'bg-green-50 text-green-600' : 'bg-orange-50 text-orange-600'}`}>
                                                        {r.status}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                        {data.reservations.length === 0 && <tr><td colSpan="3" className="py-10 text-center font-bold text-slate-300 italic uppercase">Kayıt Bulunmuyor</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="card p-10 bg-slate-50 text-slate-900 relative overflow-hidden shadow-xl border border-blue-100">
                            <i className="fas fa-id-badge absolute -bottom-10 -right-10 text-[200px] text-blue-500 opacity-5"></i>
                            <h3 className="text-xl font-black h-font mb-10 tracking-tighter uppercase italic text-blue-600">Sürücü & Filo Durumu</h3>
                            <div className="space-y-8 relative z-10">
                                <div className="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest leading-none">Aktif Sürücü</p>
                                        <p className="text-2xl font-black h-font text-slate-900">{(data.drivers || []).filter(d=>d.is_active).length} / {(data.drivers || []).length}</p>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xl shadow-inner"><i className="fas fa-user-check"></i></div>
                                </div>
                                <div className="flex justify-between items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest leading-none">Filo Doluluk</p>
                                        <p className="text-2xl font-black h-font text-slate-900">%85</p>
                                    </div>
                                    <div className="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl shadow-inner"><i className="fas fa-chart-pie"></i></div>
                                </div>
                                <button className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-[10px] tracking-widest uppercase hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30">OPERASYON RAPORU</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, value, icon, color }) => (
            <div className="card p-8 flex items-center gap-6">
                <div className={`w-16 h-16 rounded-[24px] bg-${color}-50 text-${color}-600 flex items-center justify-center text-2xl shadow-inner`}>
                    <i className={`fas ${icon}`}></i>
                </div>
                <div>
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                    <p className="text-3xl font-black h-font text-slate-900 tracking-tighter leading-none">{value}</p>
                </div>
            </div>
        );

        const BookingsView = ({ data, showToast }) => {
            const handleAction = async (id, s) => {
                const { error } = await sb.from('reservations').update({ status: s }).eq('id', id);
                if (error) return alert(error.message);
                showToast(`Durum: ${s}`);
            };

            const sendWA = (r) => {
                const text = `*ELITE DRIVE VIP TRANSFER*%0A%0ASayın ${r.customer_name},%0A%0ARezervasyonunuz onaylanmıştır.%0A%0A*Detaylar:*%0A📅 Tarih: ${r.transfer_date}%0A⏰ Saat: ${r.transfer_time}%0A📍 Rota: ${r.from_location} - ${r.to_location}%0A🚗 Araç: ${r.vehicle_type}%0A💰 Ücret: ${data.currency}${r.total_price}%0A%0A_Elite Drive Ekibi_`;
                window.open(`https://wa.me/${r.customer_phone.replace(/\D/g,'')}?text=${text}`, '_blank');
            };

            const sendEmail = (r) => {
                const subject = "Elite Drive Rezervasyon Bilgisi";
                const body = `Sayın ${r.customer_name},\n\nRezervasyonunuz onaylanmıştır.\n\nTarih: ${r.transfer_date}\nSaat: ${r.transfer_time}\nRota: ${r.from_location} - ${r.to_location}\nAraç: ${r.vehicle_type}\nFiyat: ${data.currency}${r.total_price}\n\nİyi yolculuklar dileriz.`;
                window.open(`mailto:${r.customer_email}?subject=${subject}&body=${encodeURIComponent(body)}`);
            };

            const deleteBooking = async (id) => {
                if(!confirm("Bu rezervasyonu silmek istediğinize emin misiniz?")) return;
                const { error } = await sb.from('reservations').delete().eq('id', id);
                if(error) return alert(error.message);
                showToast("Rezervasyon silindi");
            };

            return (
                <div className="card overflow-hidden">
                    <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                         <h3 className="font-black text-sm uppercase tracking-widest text-slate-500">Aktif Kayıtlar Listesi</h3>
                         <div className="flex gap-4">
                            <input type="text" placeholder="ID veya İsim Ara..." className="bg-white border rounded-xl px-4 py-2 text-xs font-bold outline-none focus:border-blue-500" />
                            <button className="bg-slate-900 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Excel'e Aktar</button>
                         </div>
                    </div>
                    <table className="w-full">
                        <thead className="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-50">
                            <tr>
                                <th className="px-10 py-5 text-left">Müşteri Detay</th>
                                <th className="px-10 py-5 text-left">Güzergah & Tarih</th>
                                <th className="px-10 py-5 text-left">Ücret / Birim</th>
                                <th className="px-10 py-5 text-right">Aksiyon</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-50">
                            {data.reservations.map(r => (
                                <tr key={r.id} className="hover:bg-slate-50 transition-all group">
                                    <td className="px-10 py-8">
                                        <p className="font-extrabold text-slate-900 text-md uppercase tracking-tight">{r.customer_name}</p>
                                        <div className="flex gap-4 mt-2">
                                            <button onClick={()=>sendWA(r)} className="text-green-500 hover:scale-125 transition-transform"><i className="fab fa-whatsapp"></i></button>
                                            <button onClick={()=>sendEmail(r)} className="text-blue-500 hover:scale-125 transition-transform"><i className="fas fa-envelope"></i></button>
                                        </div>
                                        <div className="mt-4">
                                            <select 
                                                value={r.driver_id || ''} 
                                                onChange={async (e) => {
                                                    const dId = e.target.value;
                                                    const dName = data.drivers.find(d => d.id === dId)?.full_name || '';
                                                    const { error } = await sb.from('reservations').update({ driver_id: dId || null, driver_name: dName }).eq('id', r.id);
                                                    if (error) alert(error.message);
                                                    else showToast(`Sürücü: ${dName || 'Atama Kaldırıldı'}`);
                                                }}
                                                className="w-full bg-slate-100 p-2 rounded-lg text-[9px] font-black uppercase outline-none focus:bg-white border focus:border-blue-200"
                                            >
                                                <option value="">SÜRÜCÜ ATAMASI</option>
                                                {data.drivers.map(d => <option key={d.id} value={d.id}>{d.full_name} ({d.plate_no})</option>)}
                                            </select>
                                        </div>
                                    </td>
                                    <td className="px-10 py-8">
                                        <p className="font-bold text-slate-700 text-sm uppercase">{r.from_location} ➔ {r.to_location}</p>
                                        <div className="flex items-center gap-3 mt-2">
                                            <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest"><i className="far fa-calendar-alt"></i> {r.transfer_date}</span>
                                            <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest"><i className="far fa-clock"></i> {r.transfer_time}</span>
                                        </div>
                                    </td>
                                    <td className="px-10 py-8">
                                        <p className="text-xs font-black text-slate-900 italic uppercase underline decoration-blue-200 mb-1">{r.vehicle_type}</p>
                                        <p className="font-black text-blue-600 text-lg uppercase">{data.currency}{r.total_price}</p>
                                    </td>
                                    <td className="px-10 py-8 text-right">
                                        <div className="flex items-center justify-end gap-4">
                                            <button onClick={() => deleteBooking(r.id)} className="text-red-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i className="fas fa-trash"></i></button>
                                            <select 
                                                value={r.status} 
                                                onChange={(e) => handleAction(r.id, e.target.value)}
                                                className={`outline-none px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-sm ${r.status === 'Onaylandı' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}
                                            >
                                                <option>Bekliyor</option>
                                                <option>Onaylandı</option>
                                                <option>İptal</option>
                                            </select>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const RoutesView = ({ data, showToast }) => {
            const [rt, setRt] = useState({ 
                airport_name: data.airports[0]?.name || '', 
                location: data.districts[0]?.name || '', 
                vehicle_type: 'Vito', 
                price: 0 
            });
            
            const addRoute = async () => {
                const { error } = await sb.from('routes').insert({ ...rt, site_key: SITE_KEY });
                if (error) return alert(error.message);
                showToast('Fiyat kaydedildi');
            };

            const deleteRoute = async (id) => {
                const { error } = await sb.from('routes').delete().eq('id', id);
                if (error) return alert(error.message);
                showToast('Fiyat silindi');
            };

            return (
                <div className="space-y-10">
                    <div className="card p-10 bg-white">
                        <h3 className="text-xl font-black h-font mb-10 uppercase tracking-tighter">Lokasyon Bazlı Fiyatlandırma</h3>
                        <div className="grid grid-cols-5 gap-6">
                            <Inp label="Havalimanı" type="select" options={data.airports.map(a=>a.name)} val={rt.airport_name} onChange={v => setRt({...rt, airport_name: v})} />
                            <Inp label="Varış Bölgesi" type="select" options={data.districts.map(d=>d.name)} val={rt.location} onChange={v => setRt({...rt, location: v})} />
                            <Inp label="Araç Türü" type="select" options={['Sedan', 'Vito', 'Sprinter', 'SUV']} val={rt.vehicle_type} onChange={v => setRt({...rt, vehicle_type: v})} />
                            <Inp label={`Fiyat (${data.currency})`} type="number" val={rt.price} onChange={v => setRt({...rt, price: v})} />
                            <div className="flex items-end"><button onClick={addRoute} className="w-full h-14 bg-black text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 shadow-xl transition-all">EKLE</button></div>
                        </div>
                    </div>
                    <div className="card p-8">
                        <table className="w-full">
                            <thead className="text-[10px] font-black text-slate-300 uppercase tracking-widest border-b pb-4">
                                <tr>
                                    <th className="text-left pb-4">Havalimanı</th>
                                    <th className="text-left pb-4">Bölge</th>
                                    <th className="text-left pb-4">Araç Türü</th>
                                    <th className="text-left pb-4">Fiyat</th>
                                    <th className="text-right pb-4"></th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                {data.routes.map(r => (
                                    <tr key={r.id} className="hover:bg-slate-50 transition-all">
                                        <td className="py-6 font-black text-slate-900 text-sm uppercase">{r.airport_name}</td>
                                        <td className="py-6 font-bold text-slate-500 uppercase text-xs">{r.location}</td>
                                        <td className="py-6 font-black text-blue-500 text-xs italic">{r.vehicle_type || 'Genel'}</td>
                                        <td className="py-6 font-black text-lg text-blue-600 italic">{data.currency}{r.price}</td>
                                        <td className="py-6 text-right"><button onClick={() => deleteRoute(r.id)} className="text-red-300 hover:text-red-500"><i className="fas fa-trash"></i></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const LocationsView = ({ data, showToast }) => {
            const [a, setA] = useState('');
            const [d, setD] = useState('');

            const addLoc = async (table, val, setter) => {
                if(!val) return;
                const { error } = await sb.from(table).insert({ name: val, site_key: SITE_KEY });
                if (error) return alert(error.message);
                setter(''); 
                showToast('Eklendi');
            };

            const delLoc = async (table, id) => {
                const { error } = await sb.from(table).delete().eq('id', id);
                if (error) return alert(error.message);
                showToast('Silindi');
            };

            return (
                <div className="grid grid-cols-2 gap-10">
                    <div className="card p-10">
                        <h3 className="text-xl font-black h-font mb-8 uppercase tracking-tighter">Havalimanları</h3>
                        <div className="flex gap-4 mb-8">
                            <input type="text" className="flex-1 bg-slate-50 p-4 rounded-2xl outline-none font-bold text-sm focus:bg-white border focus:border-blue-200" placeholder="Örn: Antalya Havalimanı (AYT)" value={a} onChange={e => setA(e.target.value)} />
                            <button onClick={() => addLoc('airports', a, setA)} className="bg-black text-white px-8 rounded-2xl font-black text-xs uppercase tracking-widest">EKLE</button>
                        </div>
                        <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                            {data.airports.map(i => <div key={i.id} className="flex justify-between items-center bg-slate-50 p-5 rounded-2xl group hover:shadow-md transition-all border border-transparent hover:border-blue-100"><span className="font-bold text-slate-700 uppercase tracking-tight text-sm">{i.name}</span><i className="fas fa-times-circle text-red-100 hover:text-red-400 cursor-pointer transition-colors" onClick={() => delLoc('airports', i.id)}></i></div>)}
                        </div>
                    </div>
                    <div className="card p-10">
                        <h3 className="text-xl font-black h-font mb-8 uppercase tracking-tighter">TRANSFER BÖLGELERİ</h3>
                        <div className="flex gap-4 mb-8">
                            <input type="text" className="flex-1 bg-slate-50 p-4 rounded-2xl outline-none font-bold text-sm focus:bg-white border focus:border-blue-200" placeholder="Örn: Bodrum / Yalıkavak" value={d} onChange={e => setD(e.target.value)} />
                            <button onClick={() => addLoc('districts', d, setD)} className="bg-black text-white px-8 rounded-2xl font-black text-xs uppercase tracking-widest">EKLE</button>
                        </div>
                        <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                            {data.districts.map(i => <div key={i.id} className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl group hover:shadow-md transition-all border border-transparent hover:border-blue-100"><span className="font-bold text-slate-700 uppercase tracking-tight text-sm">{i.name}</span><i className="fas fa-times-circle text-red-100 hover:text-red-400 cursor-pointer transition-colors" onClick={() => delLoc('districts', i.id)}></i></div>)}
                        </div>
                    </div>
                </div>
            );
        };

        const TimelineView = ({ data }) => (
            <div className="space-y-8 animate-in fade-in duration-700">
                <div className="card p-10 bg-slate-50 text-slate-900 overflow-hidden relative border border-blue-50">
                    <i className="fas fa-stream absolute -bottom-10 -right-10 text-[200px] text-blue-100 opacity-20"></i>
                    <h3 className="text-xl font-black h-font mb-4 tracking-tighter uppercase italic text-blue-600">Rezervasyon Akış Çizelgesi</h3>
                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest italic">Planlanmış tüm operasyonların zaman bazlı dökümü</p>
                </div>
                <div className="relative pl-10 border-l-2 border-slate-100 ml-4 space-y-10 py-10">
                    {data.reservations.length > 0 ? [...data.reservations].sort((a,b) => new Date(a.transfer_date) - new Date(b.transfer_date)).map(r => (
                        <div key={r.id} className="relative group">
                            <div className="absolute -left-[50px] w-6 h-6 rounded-full bg-white border-4 border-blue-600 z-10 group-hover:scale-125 transition-transform"></div>
                            <div className="card p-10 group-hover:border-blue-300 transition-all shadow-xl bg-white border border-slate-100">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-3 flex items-center gap-2"><i className="far fa-clock"></i> {r.transfer_date} @ {r.transfer_time}</p>
                                        <h4 className="text-xl font-black h-font tracking-tighter uppercase text-slate-800 italic">{r.customer_name}</h4>
                                        <p className="text-sm font-bold text-slate-400 mt-3 uppercase tracking-tight flex items-center gap-2">
                                            <i className="fas fa-map-marker-alt text-blue-500"></i> {r.from_location} <i className="fas fa-long-arrow-alt-right opacity-30"></i> {r.to_location}
                                        </p>
                                    </div>
                                    <div className="text-right">
                                         <span className="bg-slate-100 px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase text-slate-800 border border-slate-200 shadow-sm">{r.vehicle_type}</span>
                                         <p className="text-2xl font-black text-slate-900 h-font mt-4 italic tracking-tighter underline decoration-blue-100">{data.currency}{r.total_price}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )) : <p className="text-slate-300 font-bold italic uppercase">Gelecek rezervasyon bulunmuyor...</p>}
                </div>
            </div>
        );

        const DriversView = ({ data, showToast, updateData }) => {
            const [newD, setNewD] = useState({ name: '', phone: '', plate: '', model: '' });

            const addDriver = async () => {
                if(!newD.name || !newD.phone) return;
                const { data: d, error } = await sb.from('drivers').insert({
                    site_key: SITE_KEY,
                    full_name: newD.name,
                    phone: newD.phone,
                    plate_no: newD.plate,
                    vehicle_model: newD.model
                }).select();
                if (error) return alert(error.message);
                setNewD({ name: '', phone: '', plate: '', model: '' });
                showToast('Sürücü eklendi');
            };

            const toggleDriver = async (id, current) => {
                const { error } = await sb.from('drivers').update({ is_active: !current }).eq('id', id);
                if (error) return alert(error.message);
                showToast('Durum güncellendi');
            };

            const delDriver = async (id) => {
                if(!confirm('Sürücüyü silmek istiyor musunuz?')) return;
                const { error } = await sb.from('drivers').delete().eq('id', id);
                if (error) return alert(error.message);
                showToast('Sürücü silindi');
            };

            return (
                <div className="space-y-10">
                    <div className="card p-10 bg-slate-50 border-none shadow-inner">
                        <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-6 border-b pb-4">Yeni Sürücü & Araç Kaydı</h3>
                        <div className="grid grid-cols-5 gap-6 items-end">
                            <Inp label="SÜRÜCÜ AD SOYAD" val={newD.name} onChange={v => setNewD({...newD, name: v})} />
                            <Inp label="GSM NO" val={newD.phone} onChange={v => setNewD({...newD, phone: v})} />
                            <Inp label="ARAÇ MODEL" val={newD.model} onChange={v => setNewD({...newD, model: v})} />
                            <Inp label="PLAKA" val={newD.plate} onChange={v => setNewD({...newD, plate: v})} />
                            <button onClick={addDriver} className="bg-black text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl">EKLE</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-8">
                        {data.drivers.map(d => (
                            <div key={d.id} className="card p-8 border border-slate-100 group hover:border-blue-200 transition-all">
                                <div className="flex justify-between items-start mb-6">
                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner ${d.is_active ? 'bg-blue-50 text-blue-600' : 'bg-slate-100 text-slate-400'}`}>
                                        <i className="fas fa-user-tie"></i>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => toggleDriver(d.id, d.is_active)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${d.is_active ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'}`}>
                                            <i className={`fas ${d.is_active ? 'fa-pause' : 'fa-play'}`}></i>
                                        </button>
                                        <button onClick={() => delDriver(d.id)} className="w-8 h-8 bg-red-50 text-red-600 rounded-lg flex items-center justify-center"><i className="fas fa-trash"></i></button>
                                    </div>
                                </div>
                                <h4 className="font-black text-xl h-font uppercase italic tracking-tighter text-slate-900">{d.full_name}</h4>
                                <p className="text-xs font-bold text-slate-500 mt-1 uppercase tracking-tight">{d.phone}</p>
                                <div className="mt-6 pt-6 border-t border-slate-50 flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">ARAÇ / PLAKA</p>
                                        <p className="text-xs font-black text-blue-600 mt-1 uppercase italic tracking-tighter">{d.vehicle_model || 'Belirtilmedi'} / {d.plate_no || '---'}</p>
                                    </div>
                                    <span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${d.is_active ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}`}>{d.is_active ? 'AKTİF' : 'PASİF'}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CustomersView = ({ data, showToast }) => {
            const customers = Array.from(new Set(data.reservations.map(r => r.customer_email || r.customer_phone))).map(identity => {
                const history = data.reservations.filter(r => r.customer_email === identity || r.customer_phone === identity);
                return {
                    identity,
                    name: history[0]?.customer_name,
                    phone: history[0]?.customer_phone,
                    email: history[0]?.customer_email,
                    totalBookings: history.length,
                    totalSpent: history.reduce((acc, curr) => acc + (curr.total_price || 0), 0)
                };
            });

            return (
                <div className="space-y-10">
                    <div className="grid grid-cols-4 gap-8">
                        <StatCard label="Sistemdeki Müşteri" value={customers.length} icon="fa-user-friends" color="blue" />
                        <StatCard label="Sadık Müşteri" value={customers.filter(c=>c.totalBookings > 1).length} icon="fa-crown" color="orange" />
                        <StatCard label="Ort. Harcama" value={data.currency + " " + (customers.length ? Math.round(customers.reduce((a,b)=>a+b.totalSpent,0)/customers.length) : 0)} icon="fa-calculator" color="green" />
                        <StatCard label="Kara Liste" value="0" icon="fa-user-slash" color="red" />
                    </div>
                    <div className="card p-10">
                        <h3 className="text-xl font-black h-font mb-10 uppercase tracking-tighter italic text-slate-900 border-b pb-4">Müşteri Rehberi & CRM</h3>
                        <table className="w-full">
                            <thead className="text-[10px] font-black text-slate-300 uppercase tracking-widest">
                                <tr>
                                    <th className="pb-6 text-left">Müşteri Ad Soyad</th>
                                    <th className="pb-6 text-left">İletişim Detayları</th>
                                    <th className="pb-6 text-center">Toplam Yolculuk</th>
                                    <th className="pb-6 text-right">Toplam Hacim</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                {customers.map((c, i) => (
                                    <tr key={i} className="hover:bg-slate-50/50 transition-colors group">
                                        <td className="py-6 font-black text-slate-900 uppercase text-sm">{c.name || 'Bilinmiyor'}</td>
                                        <td className="py-6">
                                            <p className="text-xs font-bold text-slate-500">{c.phone}</p>
                                            <p className="text-[10px] text-blue-500 font-bold">{c.email}</p>
                                        </td>
                                        <td className="py-6 text-center">
                                            <span className="w-8 h-8 rounded-full bg-blue-50 text-blue-600 inline-flex items-center justify-center font-black text-xs">{c.totalBookings}</span>
                                        </td>
                                        <td className="py-6 text-right font-black text-lg text-slate-900 italic tracking-tighter">
                                            {data.currency}{c.totalSpent}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const FleetView = ({ data, showToast }) => {
            const updateField = async (id, field, value) => {
                const { error } = await sb.from('fleet').update({ [field]: value }).eq('id', id);
                if (error) return alert(error.message);
                showToast(`${field} güncellendi`);
            };

            const handleFileUpload = async (id, file) => {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result;
                    const { error } = await sb.from('fleet').update({ image_path: base64 }).eq('id', id);
                    if (error) return alert(error.message);
                    showToast("Fotoğraf yüklendi");
                };
                reader.readAsDataURL(file);
            };

            const toggleCar = async (id, currentEn) => {
                const { error } = await sb.from('fleet').update({ is_active: !currentEn }).eq('id', id);
                if (error) return alert(error.message);
                showToast("Araç durumu güncellendi");
            };

            return (
                <div className="grid grid-cols-2 gap-10">
                    {data.fleet.map(v => (
                        <div key={v.id} className="card p-10 relative overflow-hidden group border border-slate-100">
                            <div className={`absolute top-6 right-6 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest z-10 ${v.is_active ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>
                                {v.is_active ? 'Aktif' : 'Pasif'}
                            </div>
                            
                            <img src={v.image_path} className="h-40 mx-auto mb-8 object-contain transition-transform group-hover:scale-105 duration-700" alt={v.label} />
                            
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">ARAÇ ADI</label>
                                    <input type="text" defaultValue={v.label} onBlur={(e) => updateField(v.id, 'label', e.target.value)} className="w-full bg-slate-50 p-4 rounded-xl border font-black text-slate-800 focus:bg-white outline-none uppercase text-sm" />
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">KAPASİTE</label>
                                        <input type="text" defaultValue={v.capacity} onBlur={(e) => updateField(v.id, 'capacity', e.target.value)} className="w-full bg-slate-50 p-4 rounded-xl border font-bold text-slate-800 focus:bg-white outline-none text-sm" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">BAZ FİYAT ({data.currency})</label>
                                        <input type="number" defaultValue={v.base_price} onBlur={(e) => updateField(v.id, 'base_price', e.target.value)} className="w-full bg-slate-50 p-4 rounded-xl border font-bold text-slate-800 focus:bg-white outline-none text-sm" />
                                    </div>
                                </div>

                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">ARAÇ GÖRSELİ</label>
                                    <div className="flex gap-4">
                                        <input type="text" defaultValue={v.image_path} onBlur={(e) => updateField(v.id, 'image_path', e.target.value)} className="flex-1 bg-slate-50 p-4 rounded-xl border font-mono text-[10px] text-slate-500 focus:bg-white outline-none" placeholder="Görsel URL veya Base64" />
                                        <label className="bg-blue-600 text-white px-6 rounded-xl flex items-center justify-center cursor-pointer hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/20">
                                            <i className="fas fa-upload mr-2"></i> <span className="text-[10px] font-black uppercase">YÜKLE</span>
                                            <input type="file" className="hidden" accept="image/*" onChange={(e) => handleFileUpload(v.id, e.target.files[0])} />
                                        </label>
                                    </div>
                                </div>

                                <button onClick={() => toggleCar(v.id, v.is_active)} className={`w-full py-4 rounded-2xl font-black text-[11px] tracking-widest uppercase transition-all shadow-xl ${v.is_active ? 'bg-red-50 text-red-600 hover:bg-red-600 hover:text-white' : 'bg-green-600 text-white hover:bg-green-700 shadow-green-200'}`}>
                                    {v.is_active ? 'SİSTEMİ DEVRE DIŞI BIRAK' : 'SİSTEMİ AKTİF ET'}
                                </button>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const CarItem = ({ label, img, en, pr, toggle, cur }) => (
            <div className="card p-12 text-center relative overflow-hidden group">
                 <div className={`absolute top-6 right-6 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest ${en ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>{en ? 'Aktif' : 'Pasif'}</div>
                 <img src={img} className="h-48 mx-auto mb-10 object-contain drop-shadow-2xl transition-transform group-hover:scale-110 duration-700" />
                 <h4 className="text-3xl font-black h-font mb-4 tracking-tighter uppercase">{label}</h4>
                 <p className="text-4xl font-black text-blue-600 mb-10 italic uppercase tracking-tighter">{cur}{pr}</p>
                 <button onClick={toggle} className={`w-full py-5 rounded-[24px] font-black text-[11px] tracking-widest uppercase transition-all shadow-xl ${en ? 'bg-red-50 text-red-600 hover:bg-red-600 hover:text-white' : 'bg-green-600 text-white hover:bg-green-700 shadow-green-200'}`}>
                    {en ? 'Sistemi Kapat' : 'Sistemi Aç'}
                 </button>
            </div>
        );

        const SettingsView = ({ data, showToast }) => {
            const [local, setLocal] = useState(data);
            
            const saveSettings = async () => {
                const { id, airports, districts, routes, fleet, testimonials, reservations, updated_at, ...payload } = local;
                const { error } = await sb.from('site_settings').update(payload).eq('site_key', SITE_KEY);
                if (error) return alert(error.message);
                showToast('Ayarlar güncellendi');
            };

            return (
                <div className="max-w-4xl mx-auto space-y-10">
                    <div className="card p-12">
                         <h3 className="text-2xl font-black h-font mb-10 border-b pb-6 uppercase tracking-tighter">Kurumsal Yapılandırma</h3>
                         <div className="grid grid-cols-2 gap-8">
                             <Inp label="WHATSAPP MERKEZ (KODSUZ)" val={local.whatsapp} onChange={v => setLocal({...local, whatsapp: v})} />
                             <Inp label="GSM İLETİŞİM" val={local.phone} onChange={v => setLocal({...local, phone: v})} />
                             <Inp label="E-POSTA" val={local.email} onChange={v => setLocal({...local, email: v})} />
                             <Inp label="PARA BİRİMİ" type="select" options={['₺', '€', '$']} val={local.currency} onChange={v => setLocal({...local, currency: v})} />
                         </div>
                         <button onClick={saveSettings} className="mt-12 w-full py-6 bg-blue-600 text-white rounded-[24px] font-black text-sm uppercase tracking-widest shadow-2xl shadow-blue-500/30 hover:bg-blue-700 transition-all">DEĞİŞİKLİKLERİ KAYDET</button>
                    </div>
                </div>
            );
        };

        const Inp = ({ label, type = 'text', options, val, onChange }) => (
            <div>
                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">{label}</label>
                {type === 'select' ? (
                    <select value={val} onChange={e => onChange(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-extrabold focus:bg-white border focus:border-blue-200 uppercase tracking-tight text-sm">
                        {options.map((o, i) => <option key={i} value={o}>{o}</option>)}
                    </select>
                ) : (
                    <input type={type} value={val} onChange={e => onChange(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl outline-none font-extrabold focus:bg-white border focus:border-blue-200 uppercase tracking-tight text-sm" />
                )}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
